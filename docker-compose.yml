services:
  srt-translate:
    build:
      context: .
      args:
        VITE_APP_TITLE: ${VITE_APP_TITLE:-SRT Translate}
        VITE_DEFAULT_PROVIDER: ${VITE_DEFAULT_PROVIDER:-openai-compatible}
        VITE_CLAUDE_MODEL: ${VITE_CLAUDE_MODEL:-claude-3-5-sonnet-latest}
        VITE_OPENAI_MODEL: ${VITE_OPENAI_MODEL:-gpt-4o-mini}
    environment:
      PORT: 3000
      CLAUDE_API_ENDPOINT: ${CLAUDE_API_ENDPOINT:-https://api.anthropic.com/v1}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      OPENAI_API_ENDPOINT: ${OPENAI_API_ENDPOINT:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BAIDU_API_ENDPOINT: ${BAIDU_API_ENDPOINT:-https://fanyi-api.baidu.com/ait/api/aiTextTranslate}
      BAIDU_APP_ID: ${BAIDU_APP_ID:-}
      BAIDU_API_KEY: ${BAIDU_API_KEY:-}
      BAIDU_SECRET_KEY: ${BAIDU_SECRET_KEY:-}
    ports:
      - "8080:3000"
    restart: unless-stopped
