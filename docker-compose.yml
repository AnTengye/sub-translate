services:
  srt-translate:
    build:
      context: .
      args:
        VITE_APP_TITLE: ${VITE_APP_TITLE:-SRT Translate}
        VITE_DEFAULT_PROVIDER: ${VITE_DEFAULT_PROVIDER:-claude}
        VITE_CLAUDE_MODEL: ${VITE_CLAUDE_MODEL:-claude-3-5-sonnet-latest}
        VITE_OPENAI_ENDPOINT: ${VITE_OPENAI_ENDPOINT:-https://api.openai.com/v1}
        VITE_OPENAI_MODEL: ${VITE_OPENAI_MODEL:-gpt-4o-mini}
        VITE_QWEN_MODEL: ${VITE_QWEN_MODEL:-qwen-mt-turbo}
    environment:
      PORT: 3000
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      BAIDU_APP_ID: ${BAIDU_APP_ID:-}
      BAIDU_API_KEY: ${BAIDU_API_KEY:-}
      BAIDU_SECRET_KEY: ${BAIDU_SECRET_KEY:-}
    ports:
      - "8080:3000"
    restart: unless-stopped
